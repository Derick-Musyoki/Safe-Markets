<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safe Markets Auth</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.container{
    background:#ffffff10;
    padding:30px;
    border-radius:12px;
    width:360px;
    backdrop-filter: blur(12px);
    box-shadow:0 0 25px rgba(0,0,0,0.4);
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:6px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.primary{
    background:#00c6ff;
    color:black;
}

.google{
    background:white;
    color:black;
}

.switch{
    text-align:center;
    margin-top:10px;
    cursor:pointer;
    color:#00c6ff;
}

.role-box{
    display:none;
    margin-top:15px;
}

.role-btn{
    width:48%;
    padding:10px;
    margin:5px 1%;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.buyer{ background:#4caf50; color:white; }
.seller{ background:#ff9800; color:white; }

</style>
</head>

<body>

<div class="container">

    <h2 id="title">Login</h2>

    <form id="authForm">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>

        <label>
            <input type="checkbox" id="terms"> Agree to Terms
        </label>

        <button type="submit" class="primary">Login</button>
        <button type="button" class="google" onclick="googleLogin()">Continue with Google</button>
    </form>

    <!-- Role Selection -->
    <div class="role-box" id="roleBox">
        <p>Select Role:</p>
        <button class="role-btn buyer" onclick="selectRole('buyer')">Buyer</button>
        <button class="role-btn seller" onclick="selectRole('seller')">Seller</button>
    </div>

    <div class="switch" onclick="toggleMode()">Create Account</div>

</div>

<script>

let isLogin = true;
let currentUser = null;

/* Toggle Login / Signup */
function toggleMode(){
    const title = document.getElementById("title");
    const button = document.querySelector(".primary");
    const switchText = document.querySelector(".switch");

    if(isLogin){
        title.innerText = "Create Account";
        button.innerText = "Sign Up";
        switchText.innerText = "Already have account? Login";
    }else{
        title.innerText = "Login";
        button.innerText = "Login";
        switchText.innerText = "Create Account";
    }

    isLogin = !isLogin;
}

/* Handle Auth */
document.getElementById("authForm").addEventListener("submit", function(e){
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const terms = document.getElementById("terms").checked;

    if(!terms){
        alert("Accept terms first!");
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];

    if(isLogin){
        const user = users.find(u => u.email === email && u.password === password);

        if(user){
            currentUser = user;
            alert("Login successful!");
            showRoleSelection();
        }else{
            alert("Invalid credentials");
        }

    }else{
        const exists = users.find(u => u.email === email);

        if(exists){
            alert("User already exists");
            return;
        }

        const newUser = {
            email,
            password,
            roles: [],   // buyer / seller
            trustScore: 70
        };

        users.push(newUser);
        localStorage.setItem("users", JSON.stringify(users));

        alert("Account created!");
        currentUser = newUser;
        showRoleSelection();
    }
});

/* Show Role Selection */
function showRoleSelection(){
    document.getElementById("authForm").style.display = "none";
    document.getElementById("roleBox").style.display = "block";
}

/* Select Role */
function selectRole(role){
    let users = JSON.parse(localStorage.getItem("users")) || [];

    let userIndex = users.findIndex(u => u.email === currentUser.email);

    if(!users[userIndex].roles.includes(role)){
        users[userIndex].roles.push(role);
    }

    localStorage.setItem("users", JSON.stringify(users));
    localStorage.setItem("activeUser", JSON.stringify(users[userIndex]));

    alert("Logged in as " + role.toUpperCase());

    redirectUser(role);
}

/* Redirect */
function redirectUser(role){
    if(role === "buyer"){
        window.location.href = "marketplace.html";
    }else{
        window.location.href = "dashboard.html";
    }
}

/* Google Login Placeholder */
function googleLogin(){
    alert("Integrate Firebase later 🚀");
}

</script>

</body>
</html>
