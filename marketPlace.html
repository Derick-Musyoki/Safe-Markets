<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safe Markets Marketplace</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f6f9;
}

/* HEADER */
header{
    background:#0B3C5D;
    color:white;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

/* GRID */
.marketplace{
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

/* CARD */
.card{
    background:white;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
    background:#ddd;
}

.card-body{
    padding:15px;
}

.title{
    font-weight:bold;
    margin-bottom:5px;
}

.price{
    color:green;
    font-size:18px;
    font-weight:bold;
    margin-bottom:5px;
}

.desc{
    font-size:13px;
    color:#555;
    margin-bottom:10px;
}

/* BUTTONS */
.buttons{
    display:flex;
    gap:10px;
}

.btn{
    flex:1;
    padding:8px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
}

.buy{
    background:#00c853;
    color:white;
}

.cart{
    background:#ff9800;
    color:white;
}

/* CART BADGE */
.cart-box{
    position:fixed;
    top:20px;
    right:20px;
    background:#ff9800;
    color:white;
    padding:10px 15px;
    border-radius:20px;
    cursor:pointer;
    font-weight:bold;
}

.trust{
    font-size:13px;
    font-weight:bold;
    color:#2196f3;
    margin-bottom:5px;
}

</style>
</head>

<body>

<header>🛒 Safe Markets</header>

<div class="cart-box" onclick="viewCart()">
    Cart (<span id="cartCount">0</span>)
</div>

<div class="buttons">
    <button class="btn buy" onclick="buyNow(${product.id})">Buy Now</button>
    <button class="btn cart" onclick="addToCart(${product.id})">Add to Cart</button>
    <button class="btn" style="background:#2196f3;color:white"
        onclick="chatSeller('${product.seller}')">
        Chat Seller
    </button>
</div>

<div class="trust">
    Trust Score: ${product.trustScore || 50}%
</div>

<section class="marketplace" id="marketplace"></section>

<script>

/* Load products */
let products = JSON.parse(localStorage.getItem("products")) || [];

/* Cart */
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* Update cart count */
function updateCartCount(){
    document.getElementById("cartCount").innerText = cart.length;
}
updateCartCount();

/* Render products */
function renderProducts(){
    const container = document.getElementById("marketplace");
    container.innerHTML = "";

    products.filter(p => p.approved).forEach(product => {

        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <img src="${product.image || ''}" alt="product">
            <div class="card-body">
                <div class="title">${product.name}</div>
                <div class="price">$${product.price}</div>
                <div class="desc">${product.description}</div>

                <div class="buttons">
                    <button class="btn buy" onclick="buyNow(${product.id})">Buy Now</button>
                    <button class="btn cart" onclick="addToCart(${product.id})">Add to Cart</button>
                </div>
            </div>
        `;

        container.appendChild(div);
    });
}

renderProducts();

/* Buy Now */
function buyNow(id){
    let product = products.find(p => p.id === id);
    alert("Proceeding to buy: " + product.name);
    // later → payment page
}

/* Add to Cart */
function addToCart(id){
    let product = products.find(p => p.id === id);
    cart.push(product);
    localStorage.setItem("cart", JSON.stringify(cart));

    updateCartCount();
    alert(product.name + " added to cart!");
}

/* View Cart */
function viewCart(){
    if(cart.length === 0){
        alert("Cart is empty");
        return;
    }

    let items = cart.map(p => p.name + " - $" + p.price).join("\n");
    alert("Cart Items:\n\n" + items);
}

function chatSeller(sellerEmail){
    localStorage.setItem("chatWith", sellerEmail);
    window.location.href = "chat.html";
}

</script>

</body>
</html>
